name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos-intel:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Miniforge (x86_64)
        run: |
          curl -L -O "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-MacOSX-x86_64.sh"
          bash Miniforge3-MacOSX-x86_64.sh -b -p $RUNNER_TEMP/conda
          echo "$RUNNER_TEMP/conda/bin" >> $GITHUB_PATH

      - name: Create x86_64 environment
        env:
          CONDA_SUBDIR: osx-64
        run: |
          $RUNNER_TEMP/conda/bin/conda create -n py313_x64 python=3.13 -y
          export PATH="$RUNNER_TEMP/conda/envs/py313_x64/bin:$PATH"
          python --version
          python -c "import struct; print(f'Architecture: {struct.calcsize(\"P\") * 8}-bit')"
          pip install pyinstaller

      - name: Build macOS Intel app
        run: |
          export PATH="$RUNNER_TEMP/conda/envs/py313_x64/bin:$PATH"
          pyinstaller --onefile --windowed main.py

      - name: Create macOS dmg
        run: |
          hdiutil create -volname "MainApp" -srcfolder dist/main.app -ov -format UDZO main.dmg || \
          hdiutil create -volname "MainApp" -srcfolder dist/main -ov -format UDZO main.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            dist/main
            main.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build Windows exe
        run: pyinstaller --onefile --windowed main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/main.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Install tkinter for Linux
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Build Linux executable
        run: pyinstaller --onefile main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: dist/main
          retention-days: 30
