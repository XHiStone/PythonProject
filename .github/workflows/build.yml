name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.13
        run: |
          brew install python@3.13
          echo '/usr/local/bin' >> $GITHUB_PATH
          python3.13 --version

      - name: Install dependencies
        run: |
          python3.13 -m pip install pyinstaller

      - name: Build macOS app
        run: python3.13 -m PyInstaller --onefile --windowed main.py

      - name: Create macOS dmg
        run: |
          hdiutil create -volname "MainApp" -srcfolder dist/main.app -ov -format UDZO main.dmg || \
          hdiutil create -volname "MainApp" -srcfolder dist/main -ov -format UDZO main.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            dist/main
            main.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build Windows exe
        run: pyinstaller --onefile --windowed main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/main.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Install tkinter for Linux
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Build Linux executable
        run: pyinstaller --onefile main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: dist/main
          retention-days: 30
